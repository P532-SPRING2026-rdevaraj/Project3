<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs — Patient Observation Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav>
    <span class="brand">Patient Observation Tracker</span>
    <a href="index.html">Patients</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="logs.html" class="active">Logs</a>
    <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <label style="color:#fff;font-size:13px">User:</label>
        <select id="user-select" style="padding:4px 8px;border-radius:4px;border:none;font-size:13px">
            <option value="staff">staff</option>
        </select>
    </span>
</nav>

<div class="container">
    <h1 class="page-title">Logs</h1>
    <div id="alert-area"></div>

    <div class="grid-2">
        <!-- Command Log -->
        <div class="card">
            <h2>Command Log</h2>
            <p class="muted" style="margin-bottom:12px">Every state-changing action executed by staff (Command pattern).</p>
            <table>
                <thead>
                    <tr><th>ID</th><th>Type</th><th>User</th><th>At</th><th>Payload</th><th>Action</th></tr>
                </thead>
                <tbody id="cmd-tbody">
                    <tr><td colspan="6" class="empty-state">Loading…</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Audit Log -->
        <div class="card">
            <h2>Audit Log</h2>
            <p class="muted" style="margin-bottom:12px">Observation lifecycle events recorded by Observer listeners.</p>
            <table>
                <thead>
                    <tr><th>ID</th><th>Event</th><th>Obs ID</th><th>Patient ID</th><th>At</th><th>Detail</th></tr>
                </thead>
                <tbody id="audit-tbody">
                    <tr><td colspan="6" class="empty-state">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
const API = '/api';

function currentUser() { return localStorage.getItem('currentUser') || 'staff'; }
function apiHeaders() { return { 'Content-Type': 'application/json', 'X-Current-User': currentUser() }; }

async function loadUsers() {
    try {
        const res = await fetch(`${API}/users`);
        const users = await res.json();
        const sel = document.getElementById('user-select');
        sel.innerHTML = '<option value="staff">staff</option>';
        users.forEach(u => {
            if (u.username !== 'staff') sel.add(new Option(u.username + ' (' + u.role + ')', u.username));
        });
        sel.value = currentUser();
    } catch(e) {}
}
document.getElementById('user-select').addEventListener('change', function() {
    localStorage.setItem('currentUser', this.value);
});

function showAlert(msg, type = 'error') {
    const area = document.getElementById('alert-area');
    area.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => area.innerHTML = '', 5000);
}

function fmt(ts) {
    return ts ? new Date(ts).toLocaleString() : '—';
}

function truncate(s, n = 60) {
    if (!s) return '—';
    return s.length > n ? s.substring(0, n) + '…' : s;
}

async function undoCommand(entryId) {
    if (!confirm(`Undo command #${entryId}?`)) return;
    try {
        const res = await fetch(`${API}/command-log/${entryId}/undo`, {
            method: 'POST', headers: apiHeaders()
        });
        if (!res.ok) { const err = await res.json(); showAlert(err.error || 'Undo failed'); return; }
        showAlert('Command undone successfully.', 'success');
        loadCommandLog();
    } catch (err) { showAlert(err.message); }
}

async function loadCommandLog() {
    try {
        const res = await fetch(`${API}/command-log`);
        const entries = await res.json();
        const tbody = document.getElementById('cmd-tbody');
        if (!entries.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No commands yet.</td></tr>';
            return;
        }
        tbody.innerHTML = entries.map(e => {
            const undoneBadge = e.undone
                ? '<span class="badge badge-rejected">UNDONE</span>'
                : '';
            const undoBtn = !e.undone && e.commandType !== 'CREATE_PATIENT'
                ? `<button class="btn btn-outline btn-sm" onclick="undoCommand(${e.id})">Undo</button>`
                : '<span class="muted">—</span>';
            return `<tr${e.undone ? ' style="opacity:0.55"' : ''}>
                <td>${e.id}</td>
                <td><code>${e.commandType}</code> ${undoneBadge}</td>
                <td>${e.user}</td>
                <td>${fmt(e.executedAt)}</td>
                <td title="${e.payload || ''}" class="muted">${truncate(e.payload)}</td>
                <td>${undoBtn}</td>
            </tr>`;
        }).join('');
    } catch (err) {
        document.getElementById('cmd-tbody').innerHTML =
            '<tr><td colspan="6" class="empty-state">Failed to load.</td></tr>';
    }
}

async function loadAuditLog() {
    try {
        const res = await fetch(`${API}/audit-log`);
        const entries = await res.json();
        const tbody = document.getElementById('audit-tbody');
        if (!entries.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No audit events yet.</td></tr>';
            return;
        }
        tbody.innerHTML = entries.map(e => `
            <tr>
                <td>${e.id}</td>
                <td><strong>${e.event}</strong></td>
                <td>${e.observationId ?? '—'}</td>
                <td>${e.patientId ?? '—'}</td>
                <td>${fmt(e.timestamp)}</td>
                <td class="muted">${e.detail || '—'}</td>
            </tr>`).join('');
    } catch (err) {
        document.getElementById('audit-tbody').innerHTML =
            '<tr><td colspan="6" class="empty-state">Failed to load.</td></tr>';
    }
}

(async () => {
    await loadUsers();
    loadCommandLog();
    loadAuditLog();
})();

// Auto-refresh every 30 seconds
setInterval(() => { loadCommandLog(); loadAuditLog(); }, 30000);
</script>
</body>
</html>
