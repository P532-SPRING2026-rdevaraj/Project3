<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Detail — Patient Observation Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav>
    <span class="brand">Patient Observation Tracker</span>
    <a href="index.html">Patients</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="logs.html">Logs</a>
</nav>

<div class="container">
    <a href="index.html" class="back-link">&#8592; Back to Patients</a>

    <div id="alert-area"></div>

    <!-- Patient header -->
    <div class="card" id="patient-header" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
            <div>
                <h1 class="page-title mb-0" id="patient-name"></h1>
                <p class="muted">DOB: <span id="patient-dob"></span> &nbsp;|&nbsp; ID: <span id="patient-id"></span></p>
                <p id="patient-note" class="mt-8" style="color:var(--muted)"></p>
            </div>
            <button class="btn btn-success" id="evaluate-btn">&#9654; Evaluate Rules</button>
        </div>
        <div id="inference-area" style="display:none" class="mt-8">
            <div class="alert alert-info" id="inference-content"></div>
        </div>
    </div>

    <div class="grid-2">
        <!-- Record Measurement -->
        <div class="card">
            <h2>Record Measurement</h2>
            <form id="measurement-form">
                <div class="form-group">
                    <label>Phenomenon Type (Quantitative) *</label>
                    <select id="m-phenomenon-type" required>
                        <option value="">Select…</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount *</label>
                    <input type="number" step="any" id="m-amount" required placeholder="e.g. 36.6">
                </div>
                <div class="form-group">
                    <label>Unit *</label>
                    <select id="m-unit" required>
                        <option value="">Select type first…</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Applicability Time</label>
                    <input type="datetime-local" id="m-applicability">
                </div>
                <div class="form-group">
                    <label>Protocol (optional)</label>
                    <select id="m-protocol">
                        <option value="">None</option>
                    </select>
                </div>
                <div class="flex-end">
                    <button type="submit" class="btn btn-primary">Record</button>
                </div>
            </form>
        </div>

        <!-- Record Category Observation -->
        <div class="card">
            <h2>Record Category Observation</h2>
            <form id="category-form">
                <div class="form-group">
                    <label>Phenomenon Type (Qualitative) *</label>
                    <select id="c-phenomenon-type" required>
                        <option value="">Select…</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Phenomenon *</label>
                    <select id="c-phenomenon" required>
                        <option value="">Select type first…</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Presence *</label>
                    <select id="c-presence" required>
                        <option value="PRESENT">PRESENT</option>
                        <option value="ABSENT">ABSENT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Applicability Time</label>
                    <input type="datetime-local" id="c-applicability">
                </div>
                <div class="form-group">
                    <label>Protocol (optional)</label>
                    <select id="c-protocol">
                        <option value="">None</option>
                    </select>
                </div>
                <div class="flex-end">
                    <button type="submit" class="btn btn-primary">Record</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Observations list -->
    <div class="card">
        <h2>Observations (newest first)</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th><th>Type</th><th>Phenomenon Type</th>
                    <th>Value</th><th>Recorded</th><th>Applicable</th>
                    <th>Protocol</th><th>Status</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="obs-tbody">
                <tr><td colspan="9" class="empty-state">Loading…</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Reject modal -->
    <div id="reject-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center">
        <div class="card" style="width:420px;max-width:95vw">
            <h2>Reject Observation <span id="reject-obs-id"></span></h2>
            <div class="form-group">
                <label>Rejection Reason</label>
                <textarea id="reject-reason" placeholder="Provide a reason…"></textarea>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button class="btn btn-outline" onclick="closeRejectModal()">Cancel</button>
                <button class="btn btn-danger" onclick="submitReject()">Reject</button>
            </div>
        </div>
    </div>
</div>

<script>
const API = '/api';
const params = new URLSearchParams(location.search);
const patientId = params.get('id');
let rejectTargetId = null;
let allPhenomenonTypes = [];

function showAlert(msg, type = 'error') {
    const area = document.getElementById('alert-area');
    area.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => area.innerHTML = '', 5000);
}

function fmt(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleString();
}

// ---- Load patient header ----
async function loadPatient() {
    if (!patientId) { showAlert('No patient ID specified.'); return; }
    const res = await fetch(`${API}/patients/${patientId}`);
    if (!res.ok) { showAlert('Patient not found.'); return; }
    const p = await res.json();
    document.getElementById('patient-name').textContent = p.fullName;
    document.getElementById('patient-dob').textContent = p.dateOfBirth;
    document.getElementById('patient-id').textContent = p.id;
    document.getElementById('patient-note').textContent = p.note || '';
    document.getElementById('patient-header').style.display = 'block';
    document.title = p.fullName + ' — Patient Observation Tracker';
}

// ---- Load phenomenon types for dropdowns ----
async function loadPhenomenonTypes() {
    const res = await fetch(`${API}/phenomenon-types`);
    allPhenomenonTypes = await res.json();

    const mSel = document.getElementById('m-phenomenon-type');
    const cSel = document.getElementById('c-phenomenon-type');

    allPhenomenonTypes.forEach(pt => {
        if (pt.kind === 'QUANTITATIVE') {
            mSel.add(new Option(pt.name, pt.id));
        } else if (pt.kind === 'QUALITATIVE') {
            cSel.add(new Option(pt.name, pt.id));
        }
    });
}

// ---- Update unit dropdown when quantitative type changes ----
document.getElementById('m-phenomenon-type').addEventListener('change', function () {
    const pt = allPhenomenonTypes.find(x => x.id == this.value);
    const unitSel = document.getElementById('m-unit');
    unitSel.innerHTML = '<option value="">Select unit…</option>';
    if (pt && pt.allowedUnitsRaw) {
        pt.allowedUnitsRaw.split(',').filter(u => u.trim()).forEach(u => {
            unitSel.add(new Option(u.trim(), u.trim()));
        });
    }
});

// ---- Update phenomena dropdown when qualitative type changes ----
document.getElementById('c-phenomenon-type').addEventListener('change', async function () {
    const ptId = this.value;
    const phSel = document.getElementById('c-phenomenon');
    phSel.innerHTML = '<option value="">Loading…</option>';
    if (!ptId) return;
    const pt = allPhenomenonTypes.find(x => x.id == ptId);
    phSel.innerHTML = '<option value="">Select…</option>';
    if (pt && pt.phenomena) {
        pt.phenomena.forEach(ph => phSel.add(new Option(ph.name, ph.id)));
    }
});

// ---- Load protocols for dropdowns ----
async function loadProtocols() {
    const res = await fetch(`${API}/protocols`);
    const protocols = await res.json();
    [document.getElementById('m-protocol'), document.getElementById('c-protocol')].forEach(sel => {
        protocols.forEach(p => sel.add(new Option(`${p.name} (${p.accuracyRating})`, p.id)));
    });
}

// ---- Load observations ----
async function loadObservations() {
    const res = await fetch(`${API}/patients/${patientId}/observations`);
    const obs = await res.json();
    const tbody = document.getElementById('obs-tbody');
    if (!obs.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No observations yet.</td></tr>';
        return;
    }
    tbody.innerHTML = obs.map(o => {
        const value = o.type === 'MEASUREMENT'
            ? `${o.amount} ${o.unit}`
            : `${o.phenomenonName} — ${o.presence}`;
        const statusBadge = o.status === 'ACTIVE'
            ? '<span class="badge badge-active">ACTIVE</span>'
            : '<span class="badge badge-rejected">REJECTED</span>';
        const rejectBtn = o.status === 'ACTIVE'
            ? `<button class="btn btn-danger btn-sm" onclick="openRejectModal(${o.id})">Reject</button>`
            : `<span class="muted">${o.rejectionReason || '—'}</span>`;
        return `<tr>
            <td>${o.id}</td>
            <td>${o.type}</td>
            <td>${o.phenomenonTypeName}</td>
            <td>${value}</td>
            <td>${fmt(o.recordingTime)}</td>
            <td>${fmt(o.applicabilityTime)}</td>
            <td>${o.protocolName || '—'}</td>
            <td>${statusBadge}</td>
            <td>${rejectBtn}</td>
        </tr>`;
    }).join('');
}

// ---- Record measurement ----
document.getElementById('measurement-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = {
        patientId: parseInt(patientId),
        phenomenonTypeId: parseInt(document.getElementById('m-phenomenon-type').value),
        amount: parseFloat(document.getElementById('m-amount').value),
        unit: document.getElementById('m-unit').value,
        protocolId: document.getElementById('m-protocol').value || null,
        applicabilityTime: document.getElementById('m-applicability').value
            ? new Date(document.getElementById('m-applicability').value).toISOString() : null
    };
    try {
        const res = await fetch(`${API}/observations/measurement`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        if (!res.ok) { const err = await res.json(); showAlert(err.error || 'Error'); return; }
        e.target.reset();
        document.getElementById('m-unit').innerHTML = '<option value="">Select type first…</option>';
        showAlert('Measurement recorded.', 'success');
        loadObservations();
    } catch (err) { showAlert(err.message); }
});

// ---- Record category observation ----
document.getElementById('category-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = {
        patientId: parseInt(patientId),
        phenomenonId: parseInt(document.getElementById('c-phenomenon').value),
        presence: document.getElementById('c-presence').value,
        protocolId: document.getElementById('c-protocol').value || null,
        applicabilityTime: document.getElementById('c-applicability').value
            ? new Date(document.getElementById('c-applicability').value).toISOString() : null
    };
    try {
        const res = await fetch(`${API}/observations/category`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        if (!res.ok) { const err = await res.json(); showAlert(err.error || 'Error'); return; }
        e.target.reset();
        showAlert('Category observation recorded.', 'success');
        loadObservations();
    } catch (err) { showAlert(err.message); }
});

// ---- Evaluate rules ----
document.getElementById('evaluate-btn').addEventListener('click', async () => {
    try {
        const res = await fetch(`${API}/patients/${patientId}/evaluate`, { method: 'POST' });
        const inferred = await res.json();
        const area = document.getElementById('inference-area');
        const content = document.getElementById('inference-content');
        area.style.display = 'block';
        if (!inferred.length) {
            content.innerHTML = 'No rules fired for current observations.';
        } else {
            content.innerHTML = '<strong>Inferred concepts:</strong><ul class="inference-list">'
                + inferred.map(n => `<li>${n}</li>`).join('') + '</ul>';
        }
    } catch (err) { showAlert(err.message); }
});

// ---- Reject modal ----
function openRejectModal(obsId) {
    rejectTargetId = obsId;
    document.getElementById('reject-obs-id').textContent = '#' + obsId;
    document.getElementById('reject-reason').value = '';
    document.getElementById('reject-modal').style.display = 'flex';
}
function closeRejectModal() {
    document.getElementById('reject-modal').style.display = 'none';
    rejectTargetId = null;
}
async function submitReject() {
    const reason = document.getElementById('reject-reason').value.trim();
    try {
        const res = await fetch(`${API}/observations/${rejectTargetId}/reject`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reason })
        });
        if (!res.ok) { const err = await res.json(); showAlert(err.error || 'Error'); return; }
        closeRejectModal();
        showAlert('Observation rejected.', 'success');
        loadObservations();
    } catch (err) { showAlert(err.message); }
}

// ---- Init ----
(async () => {
    await loadPatient();
    await loadPhenomenonTypes();
    await loadProtocols();
    await loadObservations();
})();
</script>
</body>
</html>
