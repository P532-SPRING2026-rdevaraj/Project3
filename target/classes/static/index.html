<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Observation Tracker — Patients</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav>
    <span class="brand">Patient Observation Tracker</span>
    <a href="index.html" class="active">Patients</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="logs.html">Logs</a>
</nav>

<div class="container">
    <h1 class="page-title">Patients</h1>

    <div id="alert-area"></div>

    <div class="grid-2">
        <!-- Patient list -->
        <div class="card">
            <h2>All Patients</h2>
            <table id="patient-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Date of Birth</th>
                        <th>Note</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="patient-tbody">
                    <tr><td colspan="5" class="empty-state">Loading…</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Add patient form -->
        <div class="card">
            <h2>Add New Patient</h2>
            <form id="add-patient-form">
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" required placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label for="dateOfBirth">Date of Birth *</label>
                    <input type="date" id="dateOfBirth" required>
                </div>
                <div class="form-group">
                    <label for="note">Notes</label>
                    <textarea id="note" placeholder="Free-text clinical note…"></textarea>
                </div>
                <div class="flex-end">
                    <button type="submit" class="btn btn-primary">Add Patient</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
const API = '/api';

function showAlert(msg, type = 'error') {
    const area = document.getElementById('alert-area');
    area.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => area.innerHTML = '', 4000);
}

async function loadPatients() {
    try {
        const res = await fetch(`${API}/patients`);
        const patients = await res.json();
        const tbody = document.getElementById('patient-tbody');
        if (!patients.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No patients yet.</td></tr>';
            return;
        }
        tbody.innerHTML = patients.map(p => `
            <tr>
                <td>${p.id}</td>
                <td><strong>${p.fullName}</strong></td>
                <td>${p.dateOfBirth}</td>
                <td class="muted">${p.note || '—'}</td>
                <td><a href="patient.html?id=${p.id}" class="btn btn-outline btn-sm">View</a></td>
            </tr>`).join('');
    } catch (e) {
        showAlert('Failed to load patients: ' + e.message);
    }
}

document.getElementById('add-patient-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = {
        fullName: document.getElementById('fullName').value.trim(),
        dateOfBirth: document.getElementById('dateOfBirth').value,
        note: document.getElementById('note').value.trim() || null
    };
    try {
        const res = await fetch(`${API}/patients`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            const err = await res.json();
            showAlert(err.error || 'Error creating patient');
            return;
        }
        e.target.reset();
        showAlert('Patient created.', 'success');
        loadPatients();
    } catch (err) {
        showAlert(err.message);
    }
});

loadPatients();
</script>
</body>
</html>
